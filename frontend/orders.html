<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders — FarmLink</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌾</text></svg>">
</head>
<body data-page="orders">
<div id="navbarMount"></div>

<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-title">Navigate</div>
    <a href="dashboard.html" class="sidebar-link"><span class="icon">🏠</span> Dashboard</a>
    <a href="marketplace.html" class="sidebar-link"><span class="icon">🛒</span> Marketplace</a>
    <a href="cart.html" class="sidebar-link"><span class="icon">🛍️</span> Cart</a>
    <div class="sidebar-link active"><span class="icon">📋</span> Orders</div>
    <div class="sidebar-title" style="margin-top:16px">Quick Info</div>
    <div style="padding:12px;background:var(--primary-pale);border-radius:var(--radius-md);font-size:.82rem;color:var(--text-secondary);margin:4px 0">
      <div style="font-weight:700;color:var(--primary);margin-bottom:4px">📦 Track Your Order</div>
      Orders are updated in real time once backend is connected.
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h1>My Orders 📋</h1>
        <div class="page-subtitle">Track and manage your purchases</div>
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <select id="orderStatusFilter" class="filter-select">
          <option value="All">All Status</option>
          <option>Processing</option>
          <option>Shipped</option>
          <option>Delivered</option>
          <option>Cancelled</option>
        </select>
        <a href="marketplace.html" class="btn btn-primary btn-sm">+ New Order</a>
      </div>
    </div>

    <!-- Order Status Summary -->
    <div class="grid-4 mb-6">
      <div class="stat-card">
        <div class="stat-icon orange">⏳</div>
        <div><div class="stat-value">1</div><div class="stat-label">Processing</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon blue">🚚</div>
        <div><div class="stat-value">1</div><div class="stat-label">Shipped</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">✅</div>
        <div><div class="stat-value">1</div><div class="stat-label">Delivered</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon purple">💰</div>
        <div><div class="stat-value">₹3,275</div><div class="stat-label">Total Spent</div></div>
      </div>
    </div>

    <!-- Orders List -->
    <div style="display:flex;flex-direction:column;gap:16px" id="ordersContainer">
      <!-- Rendered by app.js -->
    </div>
  </main>
</div>

<!-- Review Modal -->
<div class="modal-overlay hidden" id="reviewModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">⭐ Write a Review</div>
      <button class="modal-close" onclick="closeReviewModal()">✕</button>
    </div>
    <input type="hidden" id="reviewProductId">
    <div style="color:var(--text-muted);font-size:.85rem;margin-bottom:16px">Reviewing: <strong id="reviewProductName"></strong></div>
    <div class="form-group mb-4">
      <label class="form-label">Your Rating</label>
      <div class="star-rating" id="interactiveStars"></div>
    </div>
    <div class="form-group mb-4">
      <label class="form-label">Your Review</label>
      <textarea id="reviewText" class="form-control" rows="4" placeholder="Tell others about your experience with this product..."></textarea>
    </div>
    <div style="display:flex;gap:12px">
      <button class="btn btn-ghost flex-1" onclick="closeReviewModal()">Cancel</button>
      <button class="btn btn-primary flex-1" onclick="submitReview()">✅ Submit Review</button>
    </div>
  </div>
</div>

<!-- Firebase (compat SDK) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
