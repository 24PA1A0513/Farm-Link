<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart — FarmLink</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌾</text></svg>">
</head>
<body data-page="cart">
<div id="navbarMount"></div>

<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-title">Navigate</div>
    <a href="dashboard.html" class="sidebar-link"><span class="icon">🏠</span> Dashboard</a>
    <a href="marketplace.html" class="sidebar-link"><span class="icon">🛒</span> Marketplace</a>
    <div class="sidebar-link active"><span class="icon">🛍️</span> Cart</div>
    <a href="orders.html" class="sidebar-link"><span class="icon">📋</span> Orders</a>
  </aside>

  <main class="main-content">
    <!-- Stepper -->
    <div class="stepper mb-6">
      <div class="step active">
        <div class="step-circle">1</div>
        <div class="step-label">Cart</div>
        <div class="step-line"></div>
      </div>
      <div class="step">
        <div class="step-circle">2</div>
        <div class="step-label">Payment</div>
        <div class="step-line"></div>
      </div>
      <div class="step">
        <div class="step-circle">3</div>
        <div class="step-label">Confirmed</div>
      </div>
    </div>

    <div class="page-header">
      <div>
        <h1>My Cart 🛍️</h1>
        <div class="page-subtitle" id="cartCount">Loading...</div>
      </div>
      <a href="marketplace.html" class="btn btn-ghost btn-sm">← Continue Shopping</a>
    </div>

    <div style="display:grid;grid-template-columns:1fr 340px;gap:24px;align-items:start">
      <!-- Cart Items -->
      <div style="display:flex;flex-direction:column;gap:12px" id="cartItems">
        <!-- Rendered by app.js -->
      </div>

      <!-- Order Summary (sticky) -->
      <div class="sticky-box" id="cartSummary">
        <!-- Rendered by app.js -->
      </div>
    </div>

    <!-- Delivery Banner -->
    <div style="margin-top:20px;background:var(--primary-pale);border-radius:var(--radius-lg);padding:14px 20px;display:flex;align-items:center;gap:12px;border:1px solid var(--border-dark)">
      <span style="font-size:1.4rem">🚚</span>
      <div>
        <div style="font-weight:700;font-size:.9rem;color:var(--primary)">Free Delivery on orders above ₹500!</div>
        <div style="font-size:.78rem;color:var(--text-muted)">Delivery within 24–48 hours to your doorstep.</div>
      </div>
    </div>
  </main>
</div>

<!-- Firebase (compat SDK) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
